# === Conexion a AWS RDS (MySQL) ===
# Los 5 parametros clave: esquema, endpoint/IP, puerto, usuario y contrasena.
# Se usan variables de entorno (DB_HOST, DB_USER, DB_PASSWORD) para NO dejar
# la contrasena en texto plano dentro del repositorio de GitHub.
# Si prefieres probarlo rapido en local, puedes reemplazar los ${...} por
# los valores reales directamente, pero NO subas ese cambio a GitHub.

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/municipalidad_la_florida?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
springdoc.api-docs.path=/api-docs
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
